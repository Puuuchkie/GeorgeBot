<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GeorgeBot — Login</title>
  <link rel="icon" href="/icon.png" type="image/png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #202225;
      color: #dcddde;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #2f3136;
      border-radius: 12px;
      padding: 40px 36px;
      width: 360px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
      text-align: center;
    }
    .card img { width: 72px; height: 72px; border-radius: 50%; margin-bottom: 16px; }
    .card h1 { font-size: 22px; margin-bottom: 6px; }
    .card p  { color: #72767d; font-size: 14px; margin-bottom: 28px; }
    input {
      width: 100%;
      padding: 10px 14px;
      background: #202225;
      border: 1px solid #444;
      border-radius: 6px;
      color: #dcddde;
      font-size: 15px;
      margin-bottom: 14px;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #5865f2; }
    button {
      width: 100%;
      padding: 10px;
      background: #5865f2;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #4752c4; }
    .error { color: #f04747; font-size: 13px; margin-top: 10px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icon.png" onerror="this.style.display='none'" alt="GeorgeBot">
    <h1>GeorgeBot</h1>
    <p>Sign in to the dashboard</p>
    <input type="password" id="pw" placeholder="Password" autofocus>
    <button id="btn">Sign in</button>
    <div class="error" id="err"></div>
  </div>
  <script>
    async function login() {
      const pw  = document.getElementById('pw').value;
      const err = document.getElementById('err');
      const res = await fetch('/api/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ password: pw }),
      });
      if (res.ok) {
        location.href = '/';
      } else {
        const d = await res.json();
        err.textContent = d.error || 'Login failed';
      }
    }
    document.getElementById('btn').addEventListener('click', login);
    document.getElementById('pw').addEventListener('keydown', e => e.key === 'Enter' && login());
  </script>
</body>
</html>
